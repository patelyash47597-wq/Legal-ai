services:
  - type: web
    name: legal-ai-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: |
      apt-get update && apt-get install -y tesseract-ocr
      pip install -r requirements.txt
      python -m spacy download en_core_web_sm
    startCommand: bash -lc "exec python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
    healthCheckType: http
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: DATABASE_URL
        fromDatabase:
          name: legal-ai-db
          property: connectionString
      - key: GROQ_API_KEY
        # Set this in Render Dashboard → Settings → Environment
        # Get from: https://console.groq.com/api-keys
      - key: HF_TOKEN
        # Set this in Render Dashboard → Settings → Environment
        # Get from: https://huggingface.co/settings/tokens
      - key: TESSERACT_CMD
        value: /usr/bin/tesseract
      - key: LAZY_LOAD_MODELS
        value: "true"

  - type: web
    name: legal-ai-frontend
    runtime: static
    buildCommand: cd legal-ai-frontend && npm install && npm run build
    staticPublishPath: legal-ai-frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://legal-ai-backend-xhht.onrender.com

databases:
  - name: legal-ai-db
    databaseName: legal_ai_db
    user: legal_ai_user
    plan: free